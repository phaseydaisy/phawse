                <textarea class="code-editor" id="codeEditor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">// Welcome to CodeNexus - Advanced Code Playground
// Try running this code!

class ParticleSystem {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.mouse = { x: 0, y: 0 };
        
        canvas.addEventListener('mousemove', (e) => {
            this.mouse.x = e.offsetX;
            this.mouse.y = e.offsetY;
        });
    }
    
    createParticle(x, y) {
        return {
            x: x || Math.random() * this.canvas.width,
            y: y || Math.random() * this.canvas.height,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            radius: Math.random() * 3 + 1,
            color: `hsl(${Math.random() * 360}, 70%, 60%)`
        };
    }
    
    animate() {
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        if (this.particles.length < 100) {
            this.particles.push(this.createParticle());
        }
        
        this.particles.forEach((particle, index) => {
            particle.x += particle.vx;
            particle.y += particle.vy;
            
            // Mouse interaction
            const dx = this.mouse.x - particle.x;
            const dy = this.mouse.y - particle.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 100) {
                particle.vx -= dx * 0.001;
                particle.vy -= dy * 0.001;
            }
            
            // Bounce off edges
            if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1;
            if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1;
            
            // Draw particle
            this.ctx.beginPath();
            this.ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
            this.ctx.fillStyle = particle.color;
            this.ctx.fill();
            
            // Connect nearby particles
            this.particles.slice(index + 1).forEach(other => {
                const dx = other.x - particle.x;
                const dy = other.y - particle.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 80) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(particle.x, particle.y);
                    this.ctx.lineTo(other.x, other.y);
                    this.ctx.strokeStyle = `rgba(255, 255, 255, ${1 - dist / 80})`;
                    this.ctx.lineWidth = 0.5;
                    this.ctx.stroke();
                }
            });
        });
        
        requestAnimationFrame(() => this.animate());
    }
}

// Initialize
const canvas = document.createElement('canvas');
canvas.width = 800;
canvas.height = 600;
canvas.style.border = '2px solid #333';
document.body.appendChild(canvas);

const system = new ParticleSystem(canvas);
system.animate();

console.log('🎨 Particle system initialized!');</textarea>

                    <button class="output-tab" data-tab="preview">

                        Preview
                    </button>
                    <button class="output-tab" data-tab="problems">

                    </button>
                </div>
                <div class="output-actions">

                    </button>
                    <button class="output-btn" id="toggleOutput" title="Minimize">

                    </button>
                </div>
            </div>
            <div class="output-content">

                    <div class="console-message info">
                        <i class="fas fa-info-circle"></i>
                        <span>Welcome to CodeNexus Console. Run your code to see output.</span>
                        <span class="timestamp">00:00:00</span>
                    </div>
                </div>
                <div class="preview-view" id="previewView">

            </div>

                <div class="settings-section">
                    <h3>Editor</h3>
                    <div class="setting-item">
                        <label for="fontSizeInput">Font Size</label>
                        <input type="range" id="fontSizeInput" min="12" max="24" value="14">
                        <span id="fontSizeValue">14px</span>
                    </div>
                    <div class="setting-item">
                        <label for="tabSizeInput">Tab Size</label>
                        <select id="tabSizeInput">

                            <option value="4" selected>4 spaces</option>
                            <option value="8">8 spaces</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="autoSaveToggle">Auto Save</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoSaveToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Theme</h3>
                    <div class="theme-grid">
                        <button class="theme-card active" data-theme="dark">
                            <div class="theme-preview dark-preview"></div>
                            <span>Dark</span>
                        </button>
                        <button class="theme-card" data-theme="light">

                        </button>
